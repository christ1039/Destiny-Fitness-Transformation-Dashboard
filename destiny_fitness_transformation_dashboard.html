<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destiny Fitness Transformation Dashboard</title>
    <style>
        /* New color palette */
        body { background-color: coral; color: pink; }
        .header { background-color: gold; }
        .accordion { background-color: pink; }
        .glow { animation: glow-animation 1s infinite;
            -webkit-animation: glow-animation 1s infinite; }
        @keyframes glow-animation { 
            0% { box-shadow: 0 0 5px pink; }
            50% { box-shadow: 0 0 20px gold; }
            100% { box-shadow: 0 0 5px pink; }
        }
        /* Responsive design styles */
        .container { display: flex; flex-direction: column; align-items: center; }
        @media (max-width: 600px) { .container { flex-direction: column; } }
    </style>
</head>

    </div>

            <h3 onclick="toggleAccordion(this)">Log Workout (New Tab)</h3><div class="content"><form>
                <input type="text" placeholder="Workout Name" required>
                <input type="number" placeholder="Duration (in minutes)" required>
                <button type="submit">Log Workout</button>
            </form></div>
        </div>
        <!-- More accordion forms go here -->
    </div>
    <script>
        function toggleAccordion(header) {
            const content = header.nextElementSibling;
            content.style.display = content.style.display === "block" ? "none" : "block";
        }

        };
    </script>
</body>
</html>

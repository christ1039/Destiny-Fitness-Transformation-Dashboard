<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0”>
<title>Destiny Fitness &mdash; Transformation Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js" defer></script>

<style>
:root {
  --pink-light:#F6B3B8; --pink-mid:#E07A86; --pink-deep:#C9586A;
  --gold-light:#F2D3A2; --gold-classic:#D4A35F; --gold-deep:#B57A2A;
  --coral:#F4A6A1; --peach:#E8B07C;
  --bar-track:#f0e8ea; --chip-bg:#fdf5f6; --chip-bg-hover:#fff5f6;
  --bg:#F4F4F4; --white:#fff; --text:#2a1a1c; --text-2:#7a5a60; --text-3:#b09090;
  --border:rgba(201,88,106,0.15); --border-gold:rgba(212,163,95,0.3);
  --z-dropdown: 50; --z-modal: 999;
  --card-bg:#fff; --radius:14px; --radius-sm:8px;
  --shadow:0 2px 16px rgba(201,88,106,0.08); --shadow-gold:0 2px 20px rgba(212,163,95,0.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}

        .ticker-wrap {
            background: rgba(0,0,0,0.15);
            padding: 5px 16px;
            margin: 0 -16px;
            overflow: hidden;
        }
        .ticker-inner {
            display: flex;
            gap: 32px;
            animation: ticker 22s linear infinite;
            white-space: nowrap;
            will-change: transform;
        }
        .ticker-item {
            font-size: 12px;
            color: rgba(255,255,255,0.65);
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }
        .ticker-item span {
            color: var(--gold-light);
            font-weight: 600;
        }
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

@media (prefers-reduced-motion: reduce) {
    .ticker-inner {
        animation: none;
    }
}

.elite-badge {
  background: linear-gradient(135deg, var(--gold-light), var(--gold-deep));
  color: #000;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  margin-bottom: 4px;
  display: inline-block;
  box-shadow: 0 0 10px rgba(212,163,95,0.4);
}
.xp-tier.elite { 
  color: var(--gold-deep); 
  text-shadow: 0 0 8px rgba(212,163,95,0.3); 
}
/* LEVEL BANNER */
.level-banner {
    display: flex;
    align-items: center;
    justify-content: center;
    position: fixed;
    inset: 0;
    background: rgba(61,10,30,0.88);
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}
.level-banner.show {
    opacity: 1;
    pointer-events: auto;
}
.level-banner.show .level-banner-card {
    animation: levelUpIn 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.level-banner-card {
    background: linear-gradient(135deg, #fff5f7, #fff);
    border-radius: 20px;
    padding: 32px 28px;
    text-align: center;
    max-width: 300px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(201,88,106,0.3);
}
@keyframes levelUpIn {
    0%   { transform: scale(0.7) translateY(20px); opacity: 0; }
    60%  { transform: scale(1.05); }
    100% { transform: scale(1) translateY(0); opacity: 1; }
}
@media (prefers-reduced-motion: reduce) {
    .level-banner-card {
        animation: none;
    }
}
.level-banner-icon { font-size: 52px; margin-bottom: 12px; display: block; }
.level-banner-title { font-family: 'Cormorant Garamond', serif; font-size: 30px; color: var(--pink-deep); margin-bottom: 4px; }
.level-banner-sub { font-size: 13px; color: var(--text-2); margin-bottom: 8px; }
.level-banner-tier { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 1px; background: linear-gradient(135deg, var(--gold-light), var(--gold-classic)); color: #7a4a10; margin-bottom: 16px; }
.level-banner-btn { background: linear-gradient(135deg, var(--pink-mid), var(--pink-deep)); color: #fff; border: none; border-radius: 10px; padding: 12px 28px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Montserrat', sans-serif; width: 100%; }
  /* PAGES */
  .page {
    display: none;
    opacity: 0;
    padding: 16px;
    padding-bottom: 80px;
}
.page.active {
    display: block;
    opacity: 1;
    transition: opacity 0.2s ease;
}
/* CARDS */
.card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    margin-bottom: 12px;
    overflow: hidden;
}
.card.champion-glow {
    animation: championGlow 3s ease-in-out infinite;
    will-change: box-shadow;
}
@keyframes championGlow {
    0%, 100% { box-shadow: 0 0 8px rgba(212,163,95,0.3); }
    50%       { box-shadow: 0 0 22px rgba(212,163,95,0.7), 0 0 40px rgba(212,163,95,0.2); }
}
.card-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    background: none;
    border: none;
    width: 100%;
    text-align: left;
    font-family: 'Montserrat', sans-serif;
}
.card-header:focus-visible {
    outline: 2px solid var(--pink-deep);
    outline-offset: 2px;
}
.card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.2px;
}
.card-toggle {
    font-size: 18px;
    color: var(--text-3);
    transition: transform 0.25s;
}
.card-toggle.open {
    transform: rotate(180deg);
}
.card-body {
    display: block;
    visibility: hidden;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease, visibility 0.25s;
    padding: 0 16px;
}
.card-body.open {
    visibility: visible;
    max-height: 600px;
    padding: 0 16px 16px;
}
@media (prefers-reduced-motion: reduce) {
    .card.champion-glow {
        animation: none;
    }
    .card-body.open {
        animation: none;
    }
}
.card-static {
    padding: 16px;
}
/* COMPACT CALENDARS & LAYOUT FIXES */
.metric-bar { background: var(--bar-track); }
.streak-section {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 320px;
}
.heatmap-grid, .photo-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 4px;
    max-width: 300px;
    width: 100%;
}
.hd, .photo-day {
    aspect-ratio: 1;
    border-radius: 4px;
    background: var(--bar-track);
    position: relative;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}
.hd:focus-visible,
.photo-day:focus-visible {
    outline: 2px solid var(--pink-deep);
    outline-offset: 2px;
}
.date-num {
    position: absolute;
    top: 2px;
    right: 2px;
    font-size: 9px;
    opacity: 0.6;
}
.hd.done {
    background: linear-gradient(135deg, var(--pink-mid), var(--pink-deep));
    color: white;
}
/* CONSTRAINED CONTAINERS */
/* chain-days: compact day-dot strip — 4px gap, 8px padding */
.chain-days {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    width: -webkit-fit-content; /* Safari/older WebKit fallback */
    width: fit-content;
    border: 1px solid var(--border);
    padding: 8px;
    border-radius: 12px;
} 
/* FORMS & BUTTONS */
.field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.field label { font-size: 11px; color: var(--text-2); font-weight: 500; }
.field input {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    width: 100%;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    color: var(--text);
    background: var(--white);
}
.field input:focus {
    outline: none;
    border-color: var(--pink-mid);
    box-shadow: 0 0 0 3px rgba(224,122,134,0.15);
}
.row-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
}
@media (max-width: 360px) {
    .row-3 {
        grid-template-columns: 1fr;
    }
}
.btn { border: none; border-radius: 8px; padding: 10px 18px; font-weight: 600; cursor: pointer; transition: opacity 0.2s ease, transform 0.2s ease; font-family: 'Montserrat', sans-serif; font-size: 13px; }
.btn:focus-visible {
    outline: 2px solid var(--pink-deep);
    outline-offset: 2px;
}
.btn-primary { background: linear-gradient(135deg, var(--pink-mid), var(--pink-deep)); color: #fff; width: 100%; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-2); }
  
/* QUICK STAT CARDS */
.stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
}
.stat-card {
    background: var(--card-bg);
    padding: 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    text-align: center;
    box-shadow: var(--shadow);
}
.stat-val {
    font-size: 18px;
    font-weight: 700;
    color: var(--pink-deep);
}

  /* CHART PLACEHOLDERS */
.chart-container {
    background: var(--card-bg);
    padding: 10px;
    border-radius: var(--radius);
    margin-bottom: 10px;
    position: relative;
    min-height: 200px;
    height: 200px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
}
  /* PRESETS */
.preset-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.preset-chip {
    padding: 5px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--chip-bg);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-2);
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    font-family: 'Montserrat', sans-serif;
}
.preset-chip:hover {
    border-color: var(--pink-mid);
    color: var(--pink-deep);
    background: var(--chip-bg-hover);
}
.preset-chip:focus-visible {
    outline: 2px solid var(--pink-deep);
    outline-offset: 2px;
}
.preset-label{font-size:11px;color:var(--text-3);font-weight:700;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px}
/* AUTOCOMPLETE */
.autocomplete-wrap {
    position: relative;
}
.autocomplete-list {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    box-shadow: 0 6px 20px rgba(201,88,106,0.12);
    z-index: var(--z-dropdown);
    overflow: hidden;
    margin-top: 2px;
    opacity: 0;
    pointer-events: none;
    visibility: hidden;
    transition: opacity 0.15s ease, visibility 0.15s;
}
.autocomplete-list.show {
    opacity: 1;
    pointer-events: auto;
    visibility: visible;
}
.autocomplete-item {
    padding: 10px 12px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    transition: background 0.1s ease;
}
.autocomplete-item:hover {
    background: var(--chip-bg);
}
.autocomplete-item:focus-visible {
    outline: 2px solid var(--pink-deep);
    outline-offset: -2px;
    background: var(--chip-bg);
}
</style> 

</head>
<body>
<header class="app-header">
    <div class="header-top">
    <div class="logo-wrap">
    <div class="logo-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M12 2L4 7v10l8 5 8-5V7z"/>
          </svg>
            </div>
            <div>
                <div class="logo-text">Destiny Fitness</div>
                <div class="logo-sub">Transformation Dashboard</div>
            </div>
        </div>
        <div id="todayDate" class="today-date"></div>
    </div>
  
    <div class="xp-bar-wrap">
  <div id="eliteBadge" class="elite-badge" style="display:none;"></div>

  <div class="xp-bar">
    <div class="xp-bar-fill" id="xpBarFill" style="width:0%"></div>
  </div>

  <div class="xp-labels">
    <span id="xpTierLabel" class="xp-tier">Beginner</span>
    <span id="xpPtsLabel">0 XP</span>
  </div>
</div>

<div class="nav-tabs" role="tablist" aria-label="Dashboard sections">
    <button type="button" class="nav-tab active" role="tab" aria-selected="true" 
            aria-controls="page-overview" onclick="switchPage('overview', this)">Overview</button>
    <button type="button" class="nav-tab" role="tab" aria-selected="false" 
            aria-controls="page-gym" onclick="switchPage('gym', this)">Gym</button>
    <button type="button" class="nav-tab" role="tab" aria-selected="false" 
            aria-controls="page-history" onclick="switchPage('history', this)">History</button>
    <button type="button" class="nav-tab" role="tab" aria-selected="false" 
            aria-controls="page-nutrition" onclick="switchPage('nutrition', this)">Nutrition</button>
    <button type="button" class="nav-tab" role="tab" aria-selected="false" 
            aria-controls="page-streak" onclick="switchPage('streak', this)">Streak</button>
    <button type="button" class="nav-tab" role="tab" aria-selected="false" 
            aria-controls="page-achievements" onclick="switchPage('achievements', this)">Badges</button>
</div>
</header>

<div class="level-banner" 
     id="levelBanner" 
     role="dialog" 
     aria-modal="true" 
     aria-labelledby="levelBannerTitle"
     aria-hidden="true">
    <div class="level-banner-card">
        <span class="level-banner-icon" id="levelBannerIcon">🏆</span>
        <div class="level-banner-title" id="levelBannerTitle">Level Up!</div>
        <div class="level-banner-sub" id="levelBannerSub">You've reached a new tier!</div>
        <div class="level-banner-tier" id="levelBannerTier" style="display:none"></div>
        <button type="button" class="level-banner-btn" id="levelBannerBtn">
            Let's Go! 🔥
        </button>
    </div>
</div>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Destiny Fitness — Transformation Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --pink-light:#F6B3B8; --pink-mid:#E07A86; --pink-deep:#C9586A;
  --gold-light:#F2D3A2; --gold-classic:#D4A35F; --gold-deep:#B57A2A;
  --coral:#F4A6A1; --peach:#E8B07C;
  --bg:#F4F4F4; --white:#fff; --text:#2a1a1c; --text-2:#7a5a60; --text-3:#b09090;
  --border:rgba(201,88,106,0.15); --border-gold:rgba(212,163,95,0.3);
  --card-bg:#fff; --radius:14px; --radius-sm:8px;
  --shadow:0 2px 16px rgba(201,88,106,0.08); --shadow-gold:0 2px 20px rgba(212,163,95,0.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
